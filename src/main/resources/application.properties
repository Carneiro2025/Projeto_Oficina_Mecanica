# ================================================================================
# SISTEMA DE GESTÃO DE OFICINA MECÂNICA - application.properties
# Versão 3.0 | Spring Boot 3.x | Java 17+
# ================================================================================

# ================================================================================
# 1. CONFIGURAÇÕES DO SERVIDOR
# ================================================================================
spring.application.name=Projeto_Oficina_Mecanica
server.port=8080
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Timeout e compressão
server.tomcat.connection-timeout=20000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.compression.enabled=true
server.compression.min-response-size=1024


# ================================================================================
# 2. BANCO DE DADOS (MySQL 8.x)
# ================================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/Projeto_Oficina_Mecanica
spring.datasource.username=root
spring.datasource.password=268108
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Pool de Conexões (HikariCP - default do Spring Boot)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway (Versionamento de Schema)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true
spring.flyway.out-of-order=false


# ================================================================================
# 3. AUTENTICAÇÃO E SEGURANÇA (JWT)
# ================================================================================
# Tokens JWT
app.jwt.secret=Projeto_Oficina_Mecanica_secret_key_jwt_spring_boot_2024_desenvolvimento_segura_min_32caracteres_obrigatorio
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# CORS
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.max-age=3600
spring.web.cors.allow-credentials=true

# Session
spring.session.store-type=none
server.servlet.session.timeout=30m

# ================================================================================
# 4. LOGGING
# ================================================================================
logging.level.root=INFO
logging.level.com.example.Projeto_Oficina_Mecanica=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/oficina-mecanica.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB


# ================================================================================
# 5. SWAGGER / OpenAPI 3.0
# ================================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.use-root-path=false
springdoc.swagger-ui.default-models-expand-depth=1
springdoc.show-actuator=false


# ================================================================================
# 6. JACKSON (JSON Serialization)
# ================================================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false
spring.jackson.time-zone=America/Recife
spring.jackson.locale=pt_BR
spring.jackson.serialization.fail-on-empty-beans=false


# ================================================================================
# 7. VALIDAÇÃO
# ================================================================================
spring.validation.enabled=true
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8


# ================================================================================
# 8. ACTUATOR (Monitoring)
# ================================================================================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized
management.metrics.export.simple.enabled=true
management.endpoint.info.enabled=true


# ================================================================================
# 9. CACHE
# ================================================================================
spring.cache.type=simple
spring.cache.cache-names=produtos,clientes,usuarios,mecanicos


# ================================================================================
# 10. FORMATAÇÃO DE DATA/HORA
# ================================================================================
spring.mvc.format.date=dd/MM/yyyy
spring.mvc.format.date-time=dd/MM/yyyy HH:mm:ss
spring.mvc.format.time=HH:mm:ss


# ================================================================================
# 11. CONFIGURAÇÕES DE UPLOAD DE ARQUIVO
# ================================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/uploads/oficina


# ================================================================================
# 12. CONFIGURAÇÕES DE BACKUP
# ================================================================================
app.backup.enabled=true
app.backup.schedule=0 0 2 * * *
app.backup.dir=/backups/oficina
app.backup.retention-days=7


# ================================================================================
# 13. CONFIGURAÇÕES DE NEGÓCIO
# ================================================================================
# Orçamento
app.business.orcamento.validade-dias=10
app.business.orcamento.numero-sequencia-inicial=1000

# Estoque
app.business.estoque.alerta-minimo-habilitado=true

# Nota Fiscal
app.business.nfs.numero-sequencia-inicial=100
app.business.nfs.serie=1

# OS - Ordem de Serviço
app.business.os.numero-sequencia-inicial=5000

# Formulários
app.business.cpf-cnpj.validacao-ativa=true
app.business.placa-veiculo.validacao-ativa=true


# ================================================================================
# 14. EMAIL (Opcional - para futuros notificações)
# ================================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu-email@gmail.com
spring.mail.password=sua-senha-app
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.email.from=noreply@oficina-mecanica.com.br
app.email.enabled=false


# ================================================================================
# 15. LIQUIBASE (Alternative a Flyway - se preferir)
# ================================================================================
# spring.liquibase.enabled=false


# ================================================================================
# 16. DESEMPENHO E QUERIES
# ================================================================================
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.use_nationalized_character_data=false
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.default_fetch_mode=SELECT

# ================================================================================
# 17. SEGURANÇA
# ================================================================================
jwt.secret=MinhaChaveSuperSecreta123456
jwt.secret=MinhaChaveSuperSecreta123456789
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# ================================================================================
# NOTA: Para diferentes ambientes, use os arquivos:
# - application-dev.properties (desenvolvimento local)
# - application-test.properties (testes automatizados)
# - application-prod.properties (produção)
#
# Ativar com: spring.profiles.active=dev ou via variável de ambiente
# ================================================================================